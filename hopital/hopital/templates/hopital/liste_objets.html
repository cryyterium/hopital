<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Objets connectés</title>
</head>
<body>
    <h1>Liste des objets connectés</h1>

    <ul>
        {% for objet in objets %}
            <li>
                {{ objet.nom }} - {{ objet.type_objet }} - {{ objet.statut }} - Batterie : {{ objet.batterie }}%
            </li>
        {% empty %}
            <li>Aucun objet connecté enregistré.</li>
        {% endfor %}
    </ul>
</body>
</html>
